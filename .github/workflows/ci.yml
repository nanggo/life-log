name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: 테스트 및 코드 품질 검사
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v6

      - name: pnpm 설정
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Node.js 설정
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: SvelteKit 초기화
        run: pnpm exec svelte-kit sync

      - name: TypeScript 타입 검사
        run: pnpm check

      - name: ESLint 및 Prettier 검사
        run: pnpm lint

      - name: 테스트 실행 및 커버리지 생성
        run: pnpm test:coverage

      - name: 커버리지 리포트 업로드 (Codecov)
        uses: codecov/codecov-action@v6
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false

      - name: 커버리지 결과 아티팩트 저장
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-summary
          path: coverage/coverage-summary.json
          retention-days: 1

      - name: 빌드 테스트
        run: pnpm build

      - name: 번들 크기 검사
        run: |
          CLIENT_DIR=".svelte-kit/output/client"
          if [ ! -d "$CLIENT_DIR" ]; then
            echo "::error::클라이언트 빌드 출력 디렉토리가 없습니다"
            exit 1
          fi

          TOTAL_KB=$(du -sk "$CLIENT_DIR" | cut -f1)
          MAX_KB=1024

          echo "📊 클라이언트 번들 크기: ${TOTAL_KB}KB"

          if [ "$TOTAL_KB" -gt "$MAX_KB" ]; then
            echo "::warning::번들 크기(${TOTAL_KB}KB)가 ${MAX_KB}KB를 초과합니다"
          fi

          if [ -d "$CLIENT_DIR/_app/immutable/chunks" ]; then
            echo ""
            echo "주요 청크:"
            ls -lhS "$CLIENT_DIR/_app/immutable/chunks/" | head -10
          fi

  comment-coverage:
    name: PR에 커버리지 결과 코멘트
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: 커버리지 아티팩트 다운로드
        uses: actions/download-artifact@v8
        with:
          name: coverage-summary

      - name: PR에 커버리지 코멘트
        uses: actions/github-script@v9
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');

            if (!fs.existsSync('./coverage-summary.json')) {
              console.log('커버리지 요약 파일이 없습니다. 스킵합니다.');
              return;
            }

            const coverageSummary = JSON.parse(fs.readFileSync('./coverage-summary.json', 'utf8'));
            const total = coverageSummary.total;

            const coverageComment = `## 📊 테스트 커버리지 리포트

            | 항목 | 커버리지 | 임계값 | 상태 |
            |------|----------|--------|------|
            | 📝 Statements | ${total.statements.pct}% | 70% | ${total.statements.pct >= 70 ? '✅' : '❌'} |
            | 🌿 Branches | ${total.branches.pct}% | 70% | ${total.branches.pct >= 70 ? '✅' : '❌'} |
            | 🔧 Functions | ${total.functions.pct}% | 70% | ${total.functions.pct >= 70 ? '✅' : '❌'} |
            | 📄 Lines | ${total.lines.pct}% | 70% | ${total.lines.pct >= 70 ? '✅' : '❌'} |

            **전체 커버리지:** ${total.statements.pct}%

            ${total.statements.pct >= 70 ? '🎉 모든 커버리지 임계값을 통과했습니다!' : '⚠️ 일부 커버리지가 임계값에 미달합니다.'}`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.data.find(comment =>
              comment.body.includes('📊 테스트 커버리지 리포트')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: coverageComment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: coverageComment
              });
            }
